name: Build and Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libvtk9-dev

      - name: Run installDeps.sh
        run: bash installDeps.sh

      - name: Configure CMake
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DENABLE_CUDA=OFF

      - name: Build
        run: cmake --build build --config Release -j2

      - name: Test
        working-directory: build
        run: ctest -V
